name: CI — Backend .NET

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependencias
        run: |
          if [ -f "src/TelecomBoliviaNet.Presentation/TelecomBoliviaNet.Presentation.csproj" ]; then
            dotnet restore src/TelecomBoliviaNet.Presentation/TelecomBoliviaNet.Presentation.csproj
          else
            echo "Proyecto principal no presente en esta rama — omitiendo build"
          fi

      - name: Compilar solución
        run: |
          if [ -f "src/TelecomBoliviaNet.Presentation/TelecomBoliviaNet.Presentation.csproj" ]; then
            dotnet build src/TelecomBoliviaNet.Presentation/TelecomBoliviaNet.Presentation.csproj --no-restore --configuration Release
          else
            echo "Proyecto principal no presente en esta rama — omitiendo build"
          fi

      - name: Ejecutar tests
        run: |
          if find . -name "*.Tests.csproj" -o -name "*Tests*.csproj" 2>/dev/null | grep -q .; then
            dotnet test --no-build --configuration Release --verbosity normal
          else
            echo "No se encontraron proyectos de test — omitiendo paso"
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t telecombolivianet-backend:ci .
          else
            echo "Dockerfile no presente en esta rama — omitiendo Docker build"
          fi
