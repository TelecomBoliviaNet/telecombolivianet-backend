name: CI — Backend .NET

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build & Test
        run: |
          CSPROJ="src/TelecomBoliviaNet.Presentation/TelecomBoliviaNet.Presentation.csproj"
          if [ ! -f "$CSPROJ" ]; then
            echo "Proyecto principal no presente en esta rama — skipping build"
            exit 0
          fi
          dotnet restore "$CSPROJ"
          dotnet build "$CSPROJ" --no-restore --configuration Release
          if find . -name "*Tests*.csproj" | grep -q .; then
            dotnet test --no-build --configuration Release --verbosity normal
          else
            echo "No se encontraron proyectos de test — omitiendo"
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Docker Build
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "Dockerfile no presente en esta rama — skipping"
            exit 0
          fi
          docker build -t telecombolivianet-backend:ci .
